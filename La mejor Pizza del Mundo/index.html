<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="style.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La mejor Pizza del Mundo</title>
</head>
<body>
    <main class="card">
        <h1>🍕🍕La mejor Pizza del Mundo🍕🍕</h1>
        <p class="subtitulo">Ingresa tus datos para el pedido de pizza🍕</p>

        <form id="formularioComidas">
            <div class="campo nombre-apellido">
                <label for="nombre">👤 Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre" required pattern="[A-Za-zÁÉÍÓÚáéíóúÑñÜü ]+" title="Solo letras y espacios.">
            </div>

            <div class="campo nombre-apellido">
                <label for="apellido">👤Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Escribe tu apellido" required pattern="[A-Za-zÁÉÍÓÚáéíóúÑñÜü ]+" title="Solo letras y espacios.">
            </div>
            <div class="campo">
                <label for="direccion">🏠 Dirección</label>
                <input type="text" id="direccion" name="direccion" placeholder="Ej: Cra 123 #45-67" required>
            </div>
            
            <div class="campo">
                <label for="edad">🎂 Edad</label>
                <input type="number" id="edad" name="edad" placeholder="Ej: 20">
            </div>

            <div class="campo">
                <label for="telefono">📞 Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej: 3001234567" pattern="[0-9]{10}" title="Ingresa un número de teléfono válido de 10 dígitos">
            </div>

            <button type="submit" class="btn-enviar">📨 Enviar</button>
        </form>
    </main>

    <script src="app.js"></script>
</body>
</html>
